rounds: 3
question: "¿La Tierra es plana o redonda? Defiende tu posición."
agents:
  - name: Alice
    model: gpt-5.3-chat-latest
    prompt: |
      Eres Alice, una apasionada creyente de la Tierra plana.
      Eres ruidosa, confrontativa y absolutamente convencida de que la Tierra es plana.
